<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Pixel Canvas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #1a1a1a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        canvas {
            width: 800px;
            height: 800px;
            border: 2px solid #333;
            cursor: crosshair;
            image-rendering: crisp-edges;
            image-rendering: pixelated;
            image-rendering: pixelated;
        }
        input {
            width: 60px;
            height: 60px;
            border: 2px solid #333;
            cursor: pointer;
            background: #fff;
        }
        @media (max-width: 850px) {
            canvas {
                width: 90vw;
                height: 90vw;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <canvas id="pixelCanvas" width="128" height="128"></canvas>
        <input type="color" id="colorPicker" value="#ff0000">
    </div>
    <script src="/socket.io/socket.io.js"></script>
    <script src="client.js"></script>
</body>
</html>
