<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Пиксель-арт холст 1024x1024</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
            background: #f0f0f0;
            text-align: center;
        }
        .canvas-container {
            overflow: auto;
            max-width: 100%;
            max-height: 80vh;
            border: 2px solid #333;
            background: #fff;
            display: inline-block;
        }
        canvas {
            cursor: crosshair;
            background: white;
            /* Масштабируем для удобства, но реальное разрешение 1024x1024 */
            width: auto;
            height: auto;
            max-width: 100%;
            max-height: 100%;
        }
        .toolbar {
            margin-bottom: 10px;
        }
        .color-preview {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 2px solid #333;
            vertical-align: middle;
            margin-left: 10px;
        }
        button {
            padding: 8px 16px;
            font-size: 16px;
            cursor: pointer;
        }
        .info {
            margin-top: 10px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <h1>🎨 Совместный пиксель-арт 1024×1024</h1>
    <div class="toolbar">
        <label>Цвет: </label>
        <input type="color" id="colorPicker" value="#ff0000">
        <div class="color-preview" id="colorPreview" style="background: #ff0000"></div>
        <button id="clearBtn">Очистить всё</button>
        <span style="margin-left: 20px;">🖱️ Кликните по любой клетке, чтобы закрасить</span>
    </div>
    <div class="canvas-container">
        <canvas id="pixelCanvas" width="1024" height="1024"></canvas>
    </div>
    <div class="info">
        Размер холста: 1024×1024 пикселя. Каждый пиксель — это клетка. Используйте масштабирование браузера или скролл.
    </div>
    
    <script src="/socket.io/socket.io.js"></script>
    <script src="client.js"></script>
</body>
</html>
